{id:'t1',title:'Incidente CCTV',description:'Verificar cámaras offline en Edificio Central.',priority:'Crítica',operator:'Matías',status:'Escalada',time:'10:32',tags:['CCTV','SLA','Zona Norte']},{id:'t2',title:'Derivación técnica',description:'Coordinar visita técnica urgente con proveedor.',priority:'Alta',operator:'Lucía',status:'Derivada',time:'10:41',tags:['Proveedor','Guardia']},{id:'t3',title:'Reporte cliente',description:'Enviar actualización operativa con evidencias.',priority:'Baja',operator:'Carvel',status:'Finalizada',time:'10:47',tags:['Cliente','Reporte']},{id:'t4',title:'Chequeo perimetral',description:'Validar sensores con oscilación de señal.',priority:'Media',operator:'Maily',status:'En proceso',time:'10:52',tags:['Sensores','Perímetro']},{id:'t5',title:'Auditoría de turno',description:'Cerrar bitácora parcial antes de relevo.',priority:'Media',operator:'Justino',status:'Pendiente',time:'11:00',tags:['Historial','Turno']}],activity:[
{id:'a1',time:'10:58',text:'Nueva tarea crítica escalada a guardia técnica.'},{id:'a2',time:'10:51',text:'Reporte exportado para Servicio Norte.'},{id:'a3',time:'10:43',text:'Lucía recibió medalla Calidad por registro completo.'},{id:'a4',time:'10:35',text:'Ranking semanal actualizado con foco colaborativo.'}]};
const navItems=[['dashboard','⌂','Dashboard'],['chat','💬','Chat'],['tasks','▣','Tareas'],['ranking','🏆','Ranking'],['stats','📈','Estadísticas'],['settings','⚙','Configuración']];
const $=id=>document.getElementById(id);const escapeHtml=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const time=v=>new Date(v).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});const fullTime=()=>new Date().toLocaleTimeString('es-AR');const occupied=()=>state.operators.filter(o=>o.online).map(o=>o.post);
function boot(){state.session=JSON.parse(localStorage.getItem('internamatutino-session')||'null');populateLogin();renderNav();if(state.session){showApp()}else{$('login').classList.remove('hidden');$('app').classList.add('hidden')}setInterval(()=>{$('clock').textContent=fullTime()},1000);setInterval(heartbeat,15000);$('clock').textContent=fullTime();}
function populateLogin(){const op=$('operatorSelect'),po=$('postSelect');op.innerHTML=operators.map(n=>`<option>${n}</option>`).join('');const occ=occupied(),firstFree=posts.find(p=>!occ.includes(p));po.innerHTML=posts.map(p=>`<option ${occ.includes(p)?'disabled':''} ${p===firstFree?'selected':''}>${p}${occ.includes(p)?' · ocupado':''}</option>`).join('');updateSeat();op.onchange=updateSeat;po.onchange=updateSeat;$('loginForm').onsubmit=e=>{e.preventDefault();const post=po.value.replace(' · ocupado','');if(occupied().includes(post)||$('shiftKey').value.trim().toLowerCase()!=='matutino2026'){toast('Clave de turno incorrecta');return;}state.session={operator:op.value,post,avatar:op.value[0],sessionId:crypto.randomUUID(),startedAt:new Date().toISOString()};localStorage.setItem('internamatutino-session',JSON.stringify(state.session));showApp();toast(`Turno iniciado por ${state.session.operator}`)}}
function updateSeat(){const post=$('postSelect').value.replace(' · ocupado',''),locked=occupied().includes(post);$('seatStatus').className=`seat-status ${locked?'danger':''}`;$('seatStatus').textContent=locked?'⛔ Puesto ocupado en vivo. Seleccioná otro.':'Puesto disponible';$('loginButton').disabled=locked;}
function showApp(){$('login').classList.add('hidden');$('app').classList.remove('hidden');state.operators=state.operators.map(o=>o.name===state.session.operator?{...o,post:state.session.post,online:true}:o);$('sessionAvatar').textContent=state.session.avatar;$('sessionName').textContent=state.session.operator;$('sessionPost').textContent=`${state.session.post} · online`;$('miniAvatar').textContent=state.session.avatar;$('miniPost').textContent=state.session.post.replace('Puesto ','P');render();}
function renderNav(){$('nav').innerHTML=navItems.map(([id,ico,label])=>`<button data-page="${id}">${ico}<span>${label}</span><i></i></button>`).join('');$('nav').onclick=e=>{const btn=e.target.closest('button[data-page]');if(!btn)return;state.active=btn.dataset.page;$('sidebar').classList.remove('open');render();};$('logoutBtn').onclick=logout;$('openMenu').onclick=()=>$('sidebar').classList.add('open');$('closeMenu').onclick=()=>$('sidebar').classList.remove('open');}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===state.active));$('onlinePill').textContent=`👥 ${state.operators.filter(o=>o.online).length}/10`;const views={dashboard,chat,tasks,ranking,stats,settings};$('content').innerHTML=views[state.active]();bindPage();renderToasts();}
function head(title,action=''){return`<div class="panel-head"><h3>${title}</h3>${action}</div>`}function metric(label,value,tone=''){return`<article class="metric card glass ${tone}"><span>${label}</span><b>${value}</b><div class="line"></div></article>`}function dashboard(){return`<div class="dashboard"><section class="hero card glass"><div><p class="eyebrow">Turno operativo activo</p><h2>Centro InternaMatutino estabilizado, ${escapeHtml(state.session.operator)}.</h2><p class="muted">Vista táctica con chat rápido, incidentes, actividad de turno y ranking colaborativo en vivo.</p></div><div class="radar">🛡</div></section><section class="metrics">${metric('Operadores online',state.operators.filter(o=>o.online).length,'success')}${metric('Incidentes críticos',state.tasks.filter(t=>t.priority==='Crítica').length,'danger')}${metric('Tareas pendientes',state.tasks.filter(t=>t.status!=='Finalizada').length,'warning')}</section><section class="panel-xl card glass">${head('Chat rápido operativo','<button data-go="chat">Abrir chat ›</button>')}<div class="messages">${chatList(state.messages.slice(-4),true)}</div></section><section class="panel-md card glass">${head('Tareas disponibles')}${taskStack(state.tasks.slice(0,4))}</section><section class="panel-side card glass">${head('Ranking colaborativo')}${rankingList(state.operators.slice(0,5))}</section><section class="panel-wide card glass">${head('Actividad del turno')}${timeline(state.activity)}</section></div>`}
function chat(){return`<div class="chat-layout"><section class="channels card glass">${head('Canales')}<button class="channel active">📡<span># general-turno<small>${state.operators.filter(o=>o.online).length} online</small></span></button><button class="channel">🚨<span># incidentes<small>3 críticos</small></span></button><button class="channel">🎙<span># coordinación<small>voz standby</small></span></button>${head('Privados')}${state.operators.slice(0,6).map(o=>`<button class="channel">👥<span>${o.name}<small>${o.post}</small></span><i class="${o.online?'on':''}"></i></button>`).join('')}</section><section class="chat-main card glass"><div class="chat-title"><div><h2># general-turno</h2><span>Mensajes, respuestas, fijados, adjuntos e importantes</span></div><div class="chat-tools"><button>📌 3 fijados</button><button>⋯</button></div></div><div class="messages" id="messages">${chatList(state.messages,false)}</div><div class="composer"><button>＋</button><button>📎</button><input id="messageInput" placeholder="Escribir mensaje operativo, @mencionar o /crear tarea..." /><button class="send" id="sendMessage">➤</button></div></section><aside class="context card glass">${head('Contexto vivo')}<div class="pinned"><strong>📌 Protocolo fijado</strong><p>Priorizar eventos críticos CCTV, derivar a técnico y registrar el seguimiento.</p></div>${taskStack(state.tasks.slice(0,3))}</aside></div>`}
function chatList(messages){return messages.map(m=>`<article class="message ${state.session&&state.session.operator===m.operator?'own':''}"><div class="avatar">${m.operator[0]}</div><div class="bubble"><div class="meta"><strong>${m.operator}</strong><span>${m.post}</span><time>${time(m.createdAt)}</time>${m.important?'⭐':''}</div>${m.replyTo?`<div class="quote">${escapeHtml(m.replyTo)}</div>`:''}<p>${escapeHtml(m.text)}</p><div class="msg-actions"><span>✓✓ leído</span><button>Responder</button><button data-task-from-message="${m.id}">Crear tarea</button><button>😊</button></div></div></article>`).join('')}
function tasks(){return`<div class="module"><section class="module-hero card glass"><div class="module-icon">▣</div><div><p class="eyebrow">InternaMatutino</p><h2>Sistema de tareas</h2><p class="muted">Kanban operativo sin tablas, con historial, prioridades, etiquetas y creación desde mensajes.</p></div></section><div class="kanban">${['Pendiente','En proceso','Derivada','Escalada','Finalizada','Cancelada'].map(s=>`<section class="kanban-col card glass">${head(s)}${taskStack(state.tasks.filter(t=>t.status===s))}</section>`).join('')}</div></div>`}
function taskStack(tasks){return`<div class="task-stack">${tasks.map(t=>`<article class="task ${t.priority.toLowerCase()}"><div class="task-top"><strong>${t.title}</strong><span>${t.priority}</span></div><p>${t.description}</p><div class="tags">${t.tags.map(tag=>`<em>${tag}</em>`).join('')}</div><footer><span>${t.operator}</span><small>${t.time}</small></footer></article>`).join('')||'<div class="skeleton"></div><div class="skeleton"></div>'}</div>`}
function ranking(){return`<div class="module ranking-page"><section class="module-hero card glass"><div class="module-icon">🏆</div><div><p class="eyebrow">InternaMatutino</p><h2>Ranking colaborativo</h2><p class="muted">Premia calidad, constancia, liderazgo y trabajo en equipo sin competitividad tóxica.</p></div></section><div class="card glass">${rankingList(state.operators,true)}</div><div class="badges">${['Rapidez','Calidad','Liderazgo','Resolución','Disciplina','Equipo'].map((b,i)=>`<article class="badge-card card glass"><div class="big">🏅</div><strong>${b}</strong><span class="muted">${state.operators[i].name}</span></article>`).join('')}</div></div>`}
function rankingList(ops,expanded=false){return`<div class="ranking-list">${ops.map((o,i)=>`<div class="rank-row"><b>#${i+1}</b><div class="avatar">${o.name[0]}</div><span><strong>${o.name}</strong><small>${o.post} · Nivel ${o.level}</small></span><div class="xp-bar"><i style="width:${Math.min(100,o.xp/4)}%"></i></div><em>${o.xp} XP</em>${expanded?`<small>${o.reputation}% reputación</small>`:''}</div>`).join('')}</div>`}
function stats(){return`<div class="module"><section class="module-hero card glass"><div class="module-icon">📈</div><div><p class="eyebrow">InternaMatutino</p><h2>Estadísticas operativas</h2><p class="muted">KPIs en vivo para continuidad del turno, resolución, SLA, carga de tareas y desempeño colaborativo.</p></div></section><div class="stats-grid">${chart('Resolución por hora')}${chart('Tendencia semanal')}${chart('Carga por puesto')}${`<article class="chart card glass">${head('Historial operativo')}${timeline(state.activity)}</article>`}</div></div>`}
function chart(title){return`<article class="chart card glass">${head(title)}<div class="fake-chart">${Array.from({length:18},(_,i)=>`<span style="--h:${30+((i*17)%65)}%"></span>`).join('')}</div></article>`}
function settings(){return`<div class="module"><section class="module-hero card glass"><div class="module-icon">⚙</div><div><p class="eyebrow">InternaMatutino</p><h2>Configuración</h2><p class="muted">Modo HTML único: CSS y JavaScript embebidos, sesión local, sonidos suaves, preferencias visuales y health checks simulados.</p></div></section><div class="settings"><article class="setting-card card glass"><div class="big">🛡</div><strong>Sesión activa</strong><p class="muted">${state.session.operator} · ${state.session.post}</p></article><article class="setting-card card glass"><div class="big">📡</div><strong>Realtime demo</strong><p class="muted">Listeners locales simulados sin archivos externos.</p></article><article class="setting-card card glass"><div class="big">✨</div><strong>UI premium</strong><p class="muted">Glassmorphism, blur, microanimaciones y skeleton loading.</p></article><article class="setting-card card glass"><div class="big">🕘</div><strong>Historial</strong><p class="muted">Auditoría visual de mensajes y tareas.</p></article></div></div>`}
function timeline(events){return`<div class="timeline">${events.map(e=>`<div><i></i><span>${e.time}</span><p>${e.text}</p></div>`).join('')}</div>`}
function bindPage(){document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.active=b.dataset.go;render()});const send=$('sendMessage'),input=$('messageInput');if(send&&input){send.onclick=sendMessage;input.onkeydown=e=>{if(e.key==='Enter')sendMessage()};setTimeout(()=>{$('messages').scrollTop=$('messages').scrollHeight},0)}document.querySelectorAll('[data-task-from-message]').forEach(b=>b.onclick=()=>{const msg=state.messages.find(m=>m.id===b.dataset.taskFromMessage);state.tasks.unshift({id:crypto.randomUUID(),title:'Tarea desde chat',description:msg.text,priority:'Media',operator:state.session.operator,status:'Pendiente',time:time(Date.now()),tags:['Chat','Derivada']});toast('Tarea creada desde mensaje');})}
function sendMessage(){const input=$('messageInput');if(!input||!input.value.trim())return;state.messages.push({id:crypto.randomUUID(),operator:state.session.operator,post:state.session.post,text:input.value.trim(),createdAt:Date.now(),important:/!|crítico|critico/i.test(input.value)});input.value='';toast(`Mensaje enviado por ${state.session.operator}`);render();state.active='chat';render();}
function toast(text){const id=crypto.randomUUID();state.notifications.unshift({id,text});renderToasts();setTimeout(()=>{state.notifications=state.notifications.filter(n=>n.id!==id);renderToasts();},4800);}
function renderToasts(){$('toasts').innerHTML=state.notifications.slice(0,3).map(n=>`<div class="toast glass"><b>⚡</b><span>${escapeHtml(n.text)}</span></div>`).join('')}
function heartbeat(){if(!state.session)return;state.activity.unshift({id:crypto.randomUUID(),time:time(Date.now()),text:'Heartbeat de continuidad operativa recibido.'});state.activity=state.activity.slice(0,8);if(state.active==='dashboard'||state.active==='stats')render();}
function logout(){if(state.session){state.operators=state.operators.map(o=>o.name===state.session.operator?{...o,online:false}:o)}localStorage.removeItem('internamatutino-session');state.session=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');populateLogin();toast('Puesto liberado correctamente');}
boot();
</script>
