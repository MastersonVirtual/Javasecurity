/* Responsive compact layout: keeps chat composer visible on every viewport */
:root{
  --radius:clamp(16px,2vw,24px);
  --shadow:0 16px 46px rgba(0,0,0,.36);
}
html,body{height:100%;}
body{font-size:clamp(13px,1.05vw,15px);}
.shell{height:100dvh;grid-template-columns:clamp(220px,19vw,268px) minmax(0,1fr);gap:10px;padding:10px;overflow:hidden;}
.sidebar{padding:14px;}
.brand{margin-bottom:16px;}
.nav{gap:6px;}
.nav button,.logout,.icon-btn,.channel,.ghost{border-radius:14px;padding:10px 12px;}
.workspace{height:calc(100dvh - 20px);gap:10px;overflow:hidden;}
.topbar{height:auto;min-height:58px;padding:10px;gap:10px;flex-shrink:0;}
.search{height:40px;border-radius:14px;}
.pill,.clock,.mini-user,.icon-btn{height:38px;}
.content{flex:1;min-height:0;overflow:auto;padding:0 2px 6px;}
.content.content-chat{overflow:hidden;}
.card{padding:clamp(12px,1.5vw,18px);}
.dashboard,.chat-layout,.news-grid{gap:10px;}
.hero{min-height:150px;}
.hero h2,.module-hero h2{font-size:clamp(1.55rem,3vw,3rem);}
.metrics{gap:10px;}
.metric{min-height:76px;}

function tasks(){const cats=['Todas','Monitoreo','Fresh','Atención al cliente'],statuses=['Todas','Pendientes','Resueltas'];const pool=state.taskStatusFilter==='Resueltas'?resolvedTasks():state.taskStatusFilter==='Pendientes'?pendingTasks():state.tasks;const list=pool.filter(t=>state.taskFilter==='Todas'||t.category===state.taskFilter);return`<div class="module"><section class="module-hero card glass"><div class="module-icon">▣</div><div><p class="eyebrow">Interna Virtual</p><h2>Tareas del turno</h2><p class="muted">Historial de tareas: pendientes y realizadas, con creador, responsable, resolución, fecha y hora.</p></div></section><div class="card glass">${head('Nueva tarea')}${taskComposer()}</div><div class="card glass"><div class="filters">${statuses.map(st=>`<button data-status-filter="${st}" class="${state.taskStatusFilter===st?'active':''}">${st}</button>`).join('')}${cats.map(c=>`<button data-filter="${c}" class="${state.taskFilter===c?'active':''}">${c}</button>`).join('')}</div>${taskStack(list,true)}</div></div>`}

async function createTask(){const title=$('taskTitle')?.value.trim(),description=$('taskDescription')?.value.trim();if(!title||!description){toast('Completá título y descripción');return;}const priority=$('taskPriority').value,category=$('taskCategory').value,operator=$('taskAssignee').value,createdAt=Date.now();const task={title,description,priority,operator,status:'Pendiente',time:time(createdAt),category,tags:[operator==='Todos'?'Equipo':'Asignada',category],createdBy:state.session.operator,shift:state.session.shift,createdAt};try{if(db){await db.collection('tasks').add({...task,createdAtMs:createdAt})}else{state.tasks.unshift({id:crypto.randomUUID(),...task,createdAtMs:createdAt})}}catch(e){console.warn('No se pudo guardar la tarea',e);toast('No se pudo guardar la tarea en Firestore');return;}addActivity(`${state.session.operator} agregó la tarea ${title} ${operator==='Todos'?'pendiente para todos':`asignada a ${operator}`}.`);state.active='tasks';state.taskStatusFilter='Todas';state.taskFilter='Todas';toast(operator==='Todos'?'Tarea publicada para todos':'Tarea asignada a '+operator);render();}
function initFirestore(){if(!window.firebase){setFirebaseStatus('Firebase SDK no cargó');console.warn('Firebase SDK no cargó. Revisá conexión o scripts de Firebase.');toast('Firebase SDK no cargó: los mensajes NO se guardan');return;}if(!canUseFirestore()){setFirebaseStatus('Firebase sin configurar');console.warn('Firebase no configurado: falta projectId en firebaseConfig o la inicialización de Firebase Hosting.');toast('Firebase no configurado: los mensajes NO se guardan');return;}try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.firestore();setFirebaseStatus(`Firebase conectado: ${firebase.app().options.projectId||'proyecto activo'}`);subscribeUsers();subscribeTasks();subscribeMessages();subscribeQya();subscribeField();startPresenceHeartbeat();}catch(e){console.warn('Firestore no disponible',e);db=null;setFirebaseStatus('Firestore no disponible');toast('Firestore no disponible: revisá firebaseConfig y reglas');}}

function downloadShiftPdf(id){const c=state.shiftClosures.find(x=>x.id===id);if(!c){toast('No encontré el cierre para descargar');return;}const rows=(c.taskSnapshots||[]).map(t=>`<tr><td>${escapeHtml(t.title||'Visita')}</td><td>${escapeHtml(t.address||'')}</td><td>${escapeHtml(t.status||'')}</td><td>${dateTime(t.completedAtMs)}</td><td>${escapeHtml(t.completedBy||'')}</td></tr>`).join('');const html=`<html><head><title>Cierre de turno</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{color:#006465}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #ccc;padding:8px;text-align:left}.kpis{display:flex;gap:10px;flex-wrap:wrap}.kpis div{border:1px solid #ddd;border-radius:10px;padding:10px}</style></head><body><h1>Interna Virtual · Cierre de turno</h1><p><b>Supervisor:</b> ${escapeHtml(c.supervisor||'')} · <b>Turno:</b> ${escapeHtml(c.shift||'')} · <b>Fecha:</b> ${dateTime(c.closedAtMs)}</p><div class="kpis"><div><b>${c.routesCount||0}</b><br>recorridas</div><div><b>${formatDuration(c.totalDurationMs||0)}</b><br>tiempo</div><div><b>${((c.totalDistanceMeters||0)/1000).toFixed(2)} km</b><br>distancia</div><div><b>${c.eventsCount||0}</b><br>gestiones</div><div><b>${c.photosCount||0}</b><br>fotos</div></div><h2>Visitas y gestiones</h2><table><thead><tr><th>Título</th><th>Dirección</th><th>Estado</th><th>Realizada</th><th>Responsable</th></tr></thead><tbody>${rows||'<tr><td colspan="5">Sin visitas registradas</td></tr>'}</tbody></table><script>window.print()<\/script></body></html>`;const w=window.open('','_blank');if(!w){toast('El navegador bloqueó la ventana de PDF');return;}w.document.write(html);w.document.close();}
function bindPage(){const startRoute=$('startRoute'),stopRoute=$('stopRoute'),sendLocation=$('sendLocation'),addPhoto=$('addFieldPhoto'),photoInput=$('fieldEventPhoto'),finishShiftBtn=$('finishShift'),fieldToggle=$('createFieldTaskToggle'),fieldForm=$('fieldTaskForm');const shareNow=async()=>{try{await saveFieldPoint(await getGps(),true,'manual');toast('Ubicación guardada en historial')}catch(e){toast('No se pudo obtener o guardar ubicación')}};if(startRoute)startRoute.onclick=startFieldRoute;if(stopRoute)stopRoute.onclick=stopFieldRoute;if(sendLocation)sendLocation.onclick=shareNow;document.querySelectorAll('#shareLocationBottom').forEach(b=>b.onclick=shareNow);if(addPhoto&&photoInput){addPhoto.onclick=()=>photoInput.click();photoInput.onchange=e=>addFieldPhotoEvent(e.target.files[0]);}if(finishShiftBtn)finishShiftBtn.onclick=finishShift;document.querySelectorAll('[data-download-shift]').forEach(b=>b.onclick=()=>downloadShiftPdf(b.dataset.downloadShift));if(fieldToggle)fieldToggle.onclick=()=>{state.fieldTaskFormOpen=!state.fieldTaskFormOpen;render();};if(fieldForm)fieldForm.onsubmit=e=>{e.preventDefault();createFieldTask();};document.querySelectorAll('[data-accept-field-task]').forEach(b=>b.onclick=()=>decideFieldTask(b.dataset.acceptFieldTask,true));document.querySelectorAll('[data-start-field-task]').forEach(b=>b.onclick=()=>startFieldTask(b.dataset.startFieldTask));document.querySelectorAll('[data-deny-field-task]').forEach(b=>b.onclick=()=>decideFieldTask(b.dataset.denyFieldTask,false));document.querySelectorAll('[data-complete-field-task]').forEach(b=>b.onclick=()=>completeFieldTask(b.dataset.completeFieldTask));const toggleQya=$('toggleQyaForm');if(toggleQya)toggleQya.onclick=()=>{state.qyaFormOpen=!state.qyaFormOpen;render();};const clearGlobal=$('clearGlobalSearch');if(clearGlobal)clearGlobal.onclick=()=>{state.globalSearch='';const g=$('globalSearch');if(g)g.value='';render();};document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.active=b.dataset.go;render()});document.querySelectorAll('[data-channel]').forEach(b=>b.onclick=()=>{if(!channelAllowed(b.dataset.channel)){toast('Este canal corresponde a otros puestos');return;}state.privateTo=null;state.currentChannel=b.dataset.channel;state.currentWorkArea=b.dataset.channel;updatePresence();markMessagesRead();render()});document.querySelectorAll('[data-private]').forEach(b=>b.onclick=()=>{state.privateTo=b.dataset.private;markMessagesRead();render()});document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.taskFilter=b.dataset.filter;render()});document.querySelectorAll('[data-status-filter]').forEach(b=>b.onclick=()=>{state.taskStatusFilter=b.dataset.statusFilter;render()});document.querySelectorAll('[data-do-task]').forEach(b=>b.onclick=()=>completeTask(b.dataset.doTask));document.querySelectorAll('#taskForm').forEach(f=>f.onsubmit=e=>{e.preventDefault();createTask();});document.querySelectorAll('[data-remove-attachment]').forEach(b=>b.onclick=()=>{state.pendingAttachments.splice(Number(b.dataset.removeAttachment),1);render();});const imageInput=$('imageInput'),attach=$('attachImage');if(attach&&imageInput){attach.onclick=()=>imageInput.click();imageInput.onchange=e=>addImageFiles(e.target.files);}const qyaSearchInput=$('qyaSearchInput');if(qyaSearchInput){qyaSearchInput.oninput=e=>{state.qyaDraftSearch=e.target.value;if(state.qyaSearchTimer)clearTimeout(state.qyaSearchTimer);state.qyaSearchTimer=setTimeout(()=>{state.qyaSearch=state.qyaDraftSearch.trim();render();},280);};qyaSearchInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();if(state.qyaSearchTimer)clearTimeout(state.qyaSearchTimer);state.qyaSearch=state.qyaDraftSearch.trim();render();}};}['qyaKey','qyaIcon','qyaQuestion','qyaAnswer'].forEach(id=>{const el=$(id);if(el)el.oninput=el.onchange=()=>{state.qyaFormDraft={...state.qyaFormDraft,key:$('qyaKey')?.value||'',icon:$('qyaIcon')?.value||'🚨',question:$('qyaQuestion')?.value||'',answer:$('qyaAnswer')?.value||''};};});const qyaForm=$('qyaForm');if(qyaForm)qyaForm.onsubmit=async e=>{e.preventDefault();state.qyaFormDraft={...state.qyaFormDraft,key:$('qyaKey')?.value||'',icon:$('qyaIcon')?.value||'🚨',question:$('qyaQuestion')?.value||'',answer:$('qyaAnswer')?.value||''};const key=$('qyaKey').value.trim();if(key!=='3321'){const er=$('qyaError');if(er)er.textContent='Clave incorrecta. No tenés permisos para agregar preguntas.';return;}if(!db){const er=$('qyaError');if(er)er.textContent='Firebase no conectado. No se puede guardar Q&A.';toast('Firebase no conectado: Q&A no se guardó');return;}const item={icon:$('qyaIcon').value.trim()||'❓',question:$('qyaQuestion').value.trim(),answer:$('qyaAnswer').value.trim(),createdBy:state.session.operator,shift:state.session.shift,createdAtMs:Date.now()};if(!item.question||!item.answer)return;try{await db.collection('qyaItems').add(item);state.qyaSearch='';state.qyaDraftSearch='';state.qyaFormDraft={key:'',icon:'🚨',question:'',answer:''};state.qyaFormOpen=false;toast('Pregunta Q&A guardada en Firestore');}catch(err){console.warn('No se pudo guardar Q&A',err);const er=$('qyaError');if(er)er.textContent=`No se pudo guardar en Firestore: ${err.code||err.message||'error'}`;}};const send=$('sendMessage'),input=$('messageInput');if(send&&input){send.onclick=sendMessage;input.onkeydown=e=>{if(e.key==='Enter')sendMessage()};input.onpaste=e=>{const files=[...e.clipboardData.files].filter(f=>f.type.startsWith('image/'));if(files.length){e.preventDefault();addImageFiles(files);}};setTimeout(()=>{$('messages').scrollTop=$('messages').scrollHeight},0)}document.querySelectorAll('[data-task-from-message]').forEach(b=>b.onclick=async()=>{const msg=[...state.messages,...Object.values(state.privateMessages).flat()].find(m=>m.id===b.dataset.taskFromMessage);const createdAt=Date.now(),task={title:'Tarea desde chat',description:msg.text,priority:'Media',operator:state.session.operator,status:'Pendiente',time:time(createdAt),category:state.currentChannel==='General turno'?'Monitoreo':state.currentChannel,tags:['Chat','Derivada'],createdBy:state.session.operator,shift:state.session.shift,createdAt};if(db){await db.collection('tasks').add({...task,createdAtMs:createdAt})}else{state.tasks.unshift({id:crypto.randomUUID(),...task,createdAtMs:createdAt})}addActivity(`${state.session.operator} creó una tarea desde el chat.`);state.active='tasks';state.taskStatusFilter='Todas';state.taskFilter='Todas';toast('Tarea creada desde mensaje');render();})}
async function sendMessage(){const input=$('messageInput');if(!input||(!input.value.trim()&&!state.pendingAttachments.length))return;if(!db){toast('Firebase no conectado: el mensaje NO se guardó en Firestore');console.warn('Intento de enviar mensaje sin conexión a Firestore. Revisá el estado Firebase de la barra superior y las reglas de Firestore.');return;}const createdAt=Date.now();const message={id:crypto.randomUUID(),operator:state.session.operator,post:state.session.post,text:input.value.trim(),attachments:[...state.pendingAttachments],createdAt,important:/!|crítico|critico/i.test(input.value)};try{if(state.privateTo){await db.collection('privateMessages').add({from:state.session.operator,to:state.privateTo,participants:[state.session.operator,state.privateTo],post:state.session.post,text:message.text,attachments:message.attachments,important:message.important,shift:state.session.shift,createdAtMs:createdAt});addActivity(`${state.session.operator} envió un mensaje privado a ${state.privateTo}.`)}else{await db.collection('messages').add({channel:state.currentChannel,audience:state.currentChannel==='General turno'?'all':state.currentChannel,operator:state.session.operator,post:state.session.post,text:message.text,attachments:message.attachments,important:message.important,shift:state.session.shift,createdAtMs:createdAt});addActivity(`${state.session.operator} envió un mensaje en ${state.currentChannel}.`)}}catch(e){console.warn('No se pudo guardar el mensaje',e);toast(`No se pudo guardar en Firestore: ${e.code||e.message||'error'}`);return;}input.value='';state.pendingAttachments=[];toast(`Mensaje guardado en Firebase por ${state.session.operator}`);render();}
function toast(text){const id=crypto.randomUUID();state.notifications.unshift({id,text});renderToasts();setTimeout(()=>{state.notifications=state.notifications.filter(n=>n.id!==id);renderToasts();},4800);}
function renderToasts(){$('toasts').innerHTML=state.notifications.slice(0,3).map(n=>`<div class="toast glass"><b>⚡</b><span>${escapeHtml(n.text)}</span></div>`).join('')}
async function logout(){const leaving=state.session,current=currentUserDoc();if(state.fieldWatchId&&navigator.geolocation){navigator.geolocation.clearWatch(state.fieldWatchId);state.fieldWatchId=null;}if(leaving){state.operators=state.operators.map(o=>o.name===leaving.operator?{...o,online:false,lastSeenMs:0,currentWorkArea:null}:o);if(db&&current?.id){try{await db.collection('users').doc(current.id).set({online:false,lastSeenMs:0,currentWorkArea:null,shift:leaving.shift},{merge:true})}catch(e){console.warn('No se pudo marcar offline en Firestore',e);}}addActivity(`${leaving.operator} liberó ${leaving.post}.`)}if(unsubPrivate){unsubPrivate();unsubPrivate=null;}document.body.classList.remove('field-mobile');clearFieldMapSession();state.currentRouteId=null;state.currentCoords=null;localStorage.removeItem('internamatutino-session');state.session=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');populateLogin();}
boot();
