/* Responsive compact layout: keeps chat composer visible on every viewport */
:root{
  --radius:clamp(16px,2vw,24px);
  --shadow:0 16px 46px rgba(0,0,0,.36);
}
html,body{height:100%;}
body{font-size:clamp(13px,1.05vw,15px);}
.shell{height:100dvh;grid-template-columns:clamp(220px,19vw,268px) minmax(0,1fr);gap:10px;padding:10px;overflow:hidden;}
.sidebar{padding:14px;}
.brand{margin-bottom:16px;}
.nav{gap:6px;}
.nav button,.logout,.icon-btn,.channel,.ghost{border-radius:14px;padding:10px 12px;}
.workspace{height:calc(100dvh - 20px);gap:10px;overflow:hidden;}
.topbar{height:auto;min-height:58px;padding:10px;gap:10px;flex-shrink:0;}
.search{height:40px;border-radius:14px;}
.pill,.clock,.mini-user,.icon-btn{height:38px;}
.content{flex:1;min-height:0;overflow:auto;padding:0 2px 6px;}
.content.content-chat{overflow:hidden;}
.card{padding:clamp(12px,1.5vw,18px);}
.dashboard,.chat-layout,.news-grid{gap:10px;}
.hero{min-height:150px;}
.hero h2,.module-hero h2{font-size:clamp(1.55rem,3vw,3rem);}
.metrics{gap:10px;}
.metric{min-height:76px;}
.metric b{font-size:clamp(1.45rem,2.4vw,1.85rem);}
.panel-xl{min-height:320px;}

      <div class="top-actions"><div class="pill live"><i></i>LIVE</div><div class="pill firebase" id="firebaseStatus">Firebase...</div><div class="clock" id="clock">00:00:00</div><div class="pill online" id="onlinePill">👥 0/10</div><button class="icon-btn" id="notificationBell" aria-label="Notificaciones">🔔<em id="alertBadge" class="hidden"></em></button><div class="notification-menu hidden" id="alertMenu"></div><div class="mini-user"><b id="miniAvatar">A</b><span id="miniPost">P1</span></div></div>

    {id:'t2',title:'Caso Fresh devolución',description:'Coordinar validación de devolución con el equipo Fresh.',priority:'Media',operator:'Lucia',status:'Pendiente',time:'10:41',category:'Fresh',tags:['Fresh','Devolución']},

  ]
};
const navItems=[['dashboard','⌂','Dashboard'],['chat','💬','Chat'],['tasks','▣','Tareas'],['qya','📘','Q&A']];
const channels=['General turno','Fresh','Atención al cliente','Monitoreo'];
// Pegá acá el objeto firebaseConfig de Firebase Console > Configuración del proyecto > Tus apps > Web.
// También podés definir window.INTERNAMATUTINO_FIREBASE_CONFIG antes de este script si preferís no editar este archivo.
const firebaseConfig=window.INTERNAMATUTINO_FIREBASE_CONFIG||{
  apiKey:'AIzaSyC7pjDCHeshyyiYrSr422w-huAQEGptPXY',
  authDomain:'internamatutino.firebaseapp.com',
  projectId:'internamatutino',
  storageBucket:'internamatutino.firebasestorage.app',
  messagingSenderId:'99060177629',
  appId:'1:99060177629:web:2273c3ea8778678f651934'
};
let db=null,unsubTasks=null,unsubPrivate=null,unsubMessages=null,unsubQya=null,unsubUsers=null;
const hasFirebaseConfig=()=>Boolean(firebaseConfig.apiKey&&firebaseConfig.projectId&&firebaseConfig.appId);
const canUseFirestore=()=>Boolean(window.firebase&&((firebase.apps&&firebase.apps.length)||hasFirebaseConfig()));
const setFirebaseStatus=text=>{state.firebaseStatus=text;const el=$('firebaseStatus');if(el)el.textContent=text;};
const $=id=>document.getElementById(id);
const escapeHtml=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const time=v=>new Date(v).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
const dateTime=v=>v?new Date(v).toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'}):'sin fecha';
const fullTime=()=>new Date().toLocaleTimeString('es-AR');
const activeOperators=()=>state.operators.filter(o=>o.active!==false);
const occupied=()=>activeOperators().filter(o=>o.online).map(o=>o.post);
const pendingTasks=()=>state.tasks.filter(t=>t.status==='Pendiente');
const resolvedTasks=()=>state.tasks.filter(t=>t.status==='Finalizada');
function addActivity(text){state.activity.unshift({id:crypto.randomUUID(),time:time(Date.now()),text});state.activity=state.activity.slice(0,10);}
function saveAlertState(){localStorage.setItem('internamatutino-alerts',JSON.stringify(state.alerts.slice(0,30)));localStorage.setItem('internamatutino-seen-tasks',JSON.stringify([...state.seenTaskIds].slice(-200)));localStorage.setItem('internamatutino-seen-messages',JSON.stringify([...state.seenMessageIds].slice(-300)));localStorage.setItem('internamatutino-read-messages',JSON.stringify([...state.readMessageIds].slice(-600)));}
function notifyBell(type,text,refId){if(state.alerts.some(a=>a.refId===refId))return;state.alerts.unshift({id:crypto.randomUUID(),type,text,refId,time:time(Date.now()),read:false});state.alerts=state.alerts.slice(0,30);saveAlertState();toast(text);renderBell();}
function renderBell(){const badge=$('alertBadge'),menu=$('alertMenu');if(!badge||!menu)return;const unread=state.alerts.filter(a=>!a.read).length;badge.classList.toggle('hidden',!unread);menu.classList.toggle('hidden',!state.alertPanel);menu.innerHTML=`<div class="alert-head"><strong>Notificaciones</strong><button id="markAlertsRead">Marcar leídas</button></div>${state.alerts.map(a=>`<button class="alert-item ${a.read?'':'unread'}" data-alert="${a.id}"><b>${a.type==='task'?'▣':'💬'}</b><span>${escapeHtml(a.text)}<small>${a.time}</small></span></button>`).join('')||'<div class="locked-note">Sin notificaciones nuevas.</div>'}`;const mark=$('markAlertsRead');if(mark)mark.onclick=e=>{e.stopPropagation();state.alerts=state.alerts.map(a=>({...a,read:true}));saveAlertState();renderBell();};menu.querySelectorAll('[data-alert]').forEach(b=>b.onclick=()=>{const a=state.alerts.find(x=>x.id===b.dataset.alert);if(a){a.read=true;state.active=a.type==='task'?'tasks':'chat';if(a.type==='task')state.taskStatusFilter='Pendientes';saveAlertState();render();}});}
function setupBell(){const bell=$('notificationBell');if(!bell)return;bell.onclick=e=>{e.stopPropagation();state.alertPanel=!state.alertPanel;renderBell();};document.addEventListener('click',e=>{if(!$('alertMenu')?.contains(e.target)&&!bell.contains(e.target)){state.alertPanel=false;renderBell();}});renderBell();}
function boot(){state.session=JSON.parse(localStorage.getItem('internamatutino-session')||'null');initFirestore();populateLogin();renderNav();setupBell();if(state.session){showApp()}else{$('login').classList.remove('hidden');$('app').classList.add('hidden')}setInterval(()=>{$('clock').textContent=fullTime()},1000);$('clock').textContent=fullTime();}
function populateLogin(){const op=$('operatorSelect'),po=$('postSelect'),available=activeOperators();op.innerHTML=available.map(o=>`<option value="${escapeHtml(o.name)}">${escapeHtml(o.leader?o.name+' · Líder de equipos':o.name)}</option>`).join('');const occ=occupied(),firstFree=posts.find(p=>!occ.includes(p));po.innerHTML=posts.map(p=>`<option ${occ.includes(p)?'disabled':''} ${p===firstFree?'selected':''}>${p}${occ.includes(p)?' · ocupado':''}</option>`).join('');updateSeat();op.onchange=updateSeat;po.onchange=updateSeat;$('loginForm').onsubmit=e=>{e.preventDefault();const post=po.value.replace(' · ocupado','');if(!op.value){toast('No hay usuarios activos en Firebase');return;}if(occupied().includes(post)){toast('El puesto seleccionado está ocupado');return;}state.session={operator:op.value,post,avatar:op.value[0],workArea:workAreaByPost[post]||activeOperators().find(o=>o.name===op.value)?.workAreas?.[0]||'General turno',sessionId:crypto.randomUUID(),startedAt:new Date().toISOString()};localStorage.setItem('internamatutino-session',JSON.stringify(state.session));showApp();toast(`Turno iniciado por ${state.session.operator}`);addActivity(`${state.session.operator} inició sesión en ${state.session.post}.`);}}
function updateSeat(){const post=$('postSelect').value.replace(' · ocupado',''),locked=occupied().includes(post);$('seatStatus').className=`seat-status ${locked?'danger':''}`;$('seatStatus').textContent=locked?'⛔ Puesto ocupado en vivo. Seleccioná otro.':'Puesto disponible';$('loginButton').disabled=locked;}
function showApp(){$('login').classList.add('hidden');$('app').classList.remove('hidden');state.operators=state.operators.map(o=>o.name===state.session.operator?{...o,post:state.session.post,online:true}:o);state.currentWorkArea=state.session.workArea;updatePresence();document.querySelectorAll('.brand-mark').forEach(el=>el.textContent=state.session.avatar);$('sessionAvatar').textContent=state.session.avatar;$('sessionName').textContent=state.session.operator;$('sessionPost').textContent=`${state.session.post} · online`;$('miniAvatar').textContent=state.session.avatar;$('miniPost').textContent=state.session.post.replace('Puesto ','P');subscribePrivateMessages();processTaskNotifications();render();}
function renderNav(){$('nav').innerHTML=navItems.map(([id,ico,label])=>`<button data-page="${id}">${ico}<span>${label}</span><i></i></button>`).join('');$('nav').onclick=e=>{const btn=e.target.closest('button[data-page]');if(!btn)return;state.active=btn.dataset.page;$('sidebar').classList.remove('open');render();};$('logoutBtn').onclick=logout;$('openMenu').onclick=()=>$('sidebar').classList.add('open');$('closeMenu').onclick=()=>$('sidebar').classList.remove('open');}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===state.active));$('onlinePill').textContent=`👥 ${activeOperators().filter(o=>o.online).length}/${activeOperators().length||0}`;const views={dashboard,chat,tasks,qya};if(state.active==='chat')markMessagesRead();$('content').classList.toggle('content-chat',state.active==='chat');$('content').innerHTML=views[state.active]();bindPage();renderToasts();renderBell();}
function head(title,action=''){return`<div class="panel-head"><h3>${title}</h3>${action}</div>`}
function metric(label,value,tone=''){return`<article class="metric card glass ${tone}"><span>${label}</span><b>${value}</b><div class="line"></div></article>`}
function dashboard(){return`<div class="dashboard"><section class="hero card glass"><div><p class="eyebrow">Turno operativo activo</p><h2>Bienvenido, ${escapeHtml(state.session.operator)}</h2><p class="muted">Vista táctica con chat rápido, tareas pendientes, actividad real del turno y base Q&A sincronizada.</p></div><div class="radar">🛡</div></section><section class="metrics">${metric('Operadores online',activeOperators().filter(o=>o.online).length,'success')}${metric('Tareas pendientes',pendingTasks().length,'warning')}</section><section class="panel-xl card glass">${head('Chat rápido operativo','<button data-go="chat">Abrir chat ›</button>')}<div class="messages">${chatList(currentMessages().slice(-4),true)}</div></section><section class="panel-md card glass">${head('Agregar tarea al turno')}${taskComposer()}</section><section class="panel-wide card glass">${head('Tareas disponibles','<button data-go="tasks">Ver todas ›</button>')}${taskStack(pendingTasks().slice(0,6),true)}</section><section class="panel-wide card glass">${head('Actividad del turno')}${timeline(state.activity)}</section></div>`}
function currentMessages(){if(state.privateTo){const key=privateKey(state.session.operator,state.privateTo);return state.privateMessages[key]||[]}return state.messages.filter(m=>m.channel===state.currentChannel)}
function unreadBadge(count){return count?`<em class="unread-dot" title="${count} mensaje${count===1?'':'s'} pendiente${count===1?'':'s'}">${count}</em>`:''}
function unreadChannelCount(channel){return state.messages.filter(m=>m.channel===channel&&m.operator!==state.session.operator&&!state.readMessageIds.has(m.id)).length}
function unreadPrivateCount(name){const key=privateKey(state.session.operator,name);return (state.privateMessages[key]||[]).filter(m=>m.operator!==state.session.operator&&!state.readMessageIds.has(m.id)).length}
function markMessagesRead(messages=currentMessages()){messages.filter(m=>m?.id).forEach(m=>state.readMessageIds.add(m.id));saveAlertState();}
function chatStatus(){if(state.privateTo){const user=activeOperators().find(o=>o.name===state.privateTo);const online=!!user?.online;return`<div class="chat-presence"><i class="presence-dot ${online?'on':''}"></i><span>${online?'online':'offline'}</span></div>`}const members=activeOperators().filter(o=>userInChannel(o,state.currentChannel)),online=members.filter(o=>o.online).length;return`<div class="chat-presence"><i class="presence-dot ${online?'on':''}"></i><span>${state.currentChannel==='General turno'?'General · todos':online+'/'+members.length+' online'}</span></div>`}
function chat(){return`<div class="chat-layout"><section class="channels card glass">${head('Canales')}${channels.map(c=>{const members=activeOperators().filter(o=>userInChannel(o,c)),pending=unreadChannelCount(c);return`<button class="channel ${!state.privateTo&&state.currentChannel===c?'active':''}" data-channel="${c}">📡<span>${c}<small>${c==='General turno'?'todos los usuarios':members.filter(o=>o.online).length+'/'+members.length+' online'}</small></span>${unreadBadge(pending)}</button>`}).join('')}${head('Privados')}${activeOperators().filter(o=>o.name!==state.session.operator).map(o=>{const pending=unreadPrivateCount(o.name);return`<button class="channel ${state.privateTo===o.name?'active':''}" data-private="${o.name}">👥<span>${o.name}<small>${o.online?'online':'offline'} · ${o.currentWorkArea||o.post}</small></span>${unreadBadge(pending)}<i class="presence-dot ${o.online?'on':''}"></i></button>`}).join('')}</section><section class="chat-main card glass"><div class="chat-title"><div><h2>${state.privateTo?'Privado con '+escapeHtml(state.privateTo):'# '+escapeHtml(state.currentChannel)}</h2><span>${state.privateTo?'Chat privado operativo':'Mensajes del canal operativo'}</span></div>${chatStatus()}</div><div class="messages" id="messages">${chatList(currentMessages(),false)}</div><div class="composer-wrap">${attachmentPreview()}<div class="composer"><button type="button">＋</button><button type="button" class="attach ${state.pendingAttachments.length?'active':''}" id="attachImage">📎</button><input class="file-input" id="imageInput" type="file" accept="image/*" multiple /><input id="messageInput" placeholder="Escribir mensaje operativo o pegar una imagen..." /><button class="send" id="sendMessage">➤</button></div></div></section><aside class="context card glass">${head('Tareas pendientes')}<p class="muted">Asignate una tarea, marcala realizada y dejá trazabilidad del turno.</p>${taskStack(pendingTasks().slice(0,5),true)}</aside></div>`}
function chatList(messages){return messages.map(m=>`<article class="message ${state.session&&state.session.operator===m.operator?'own':''}"><div class="avatar">${m.operator[0]}</div><div class="bubble"><div class="meta"><strong>${m.operator}</strong><span>${m.post}</span><time>${time(m.createdAt)}</time>${m.important?'⭐':''}</div>${m.replyTo?`<div class="quote">${escapeHtml(m.replyTo)}</div>`:''}${m.text?`<p>${escapeHtml(m.text)}</p>`:''}${renderAttachments(m.attachments)}<div class="msg-actions"><span>✓✓ leído</span><button>Responder</button><button data-task-from-message="${m.id}">Crear tarea</button><button>😊</button></div></div></article>`).join('')||'<p class="muted">Todavía no hay mensajes en este chat.</p>'}
function tasks(){const cats=['Todas','Monitoreo','Fresh','Atención al cliente'],statuses=['Todas','Pendientes','Resueltas'];const pool=state.taskStatusFilter==='Resueltas'?resolvedTasks():state.taskStatusFilter==='Pendientes'?pendingTasks():state.tasks;const list=pool.filter(t=>state.taskFilter==='Todas'||t.category===state.taskFilter);return`<div class="module"><section class="module-hero card glass"><div class="module-icon">▣</div><div><p class="eyebrow">Interna Virtual</p><h2>Tareas del turno</h2><p class="muted">Historial sincronizado en Firestore: pendientes y realizadas, con creador, responsable, resolución, fecha y hora.</p></div></section><div class="card glass">${head('Nueva tarea')}${taskComposer()}</div><div class="card glass"><div class="filters">${statuses.map(st=>`<button data-status-filter="${st}" class="${state.taskStatusFilter===st?'active':''}">${st}</button>`).join('')}${cats.map(c=>`<button data-filter="${c}" class="${state.taskFilter===c?'active':''}">${c}</button>`).join('')}</div>${taskStack(list,true)}</div></div>`}
function taskDate(t,kind){return kind==='created'?dateTime(t.createdAtMs||t.createdAt):(t.completedAt?dateTime(t.completedAt):'pendiente')}
function taskStack(tasks,actions=false){return`<div class="task-stack">${tasks.map(t=>`<article class="task ${String(t.priority||'Media').toLowerCase()} ${t.status==='Finalizada'?'done':''}"><div class="task-top"><strong>${escapeHtml(t.title)}</strong><span>${escapeHtml(t.priority||'Media')}</span></div><p>${escapeHtml(t.description||'')}</p><div class="tags"><em>${escapeHtml(t.category||'General')}</em>${(t.tags||[]).map(tag=>`<em>${escapeHtml(tag)}</em>`).join('')}<em>${t.status}</em></div><div class="task-history"><span><b>Creada por:</b> ${escapeHtml(t.createdBy||t.operator||'equipo')} · ${taskDate(t,'created')}</span><span><b>Asignación:</b> ${t.operator==='Todos'?'Pendiente para todos':escapeHtml(t.operator||'Equipo')}</span><span><b>Resolución:</b> ${t.status==='Finalizada'?`${escapeHtml(t.completedBy||'equipo')} · ${taskDate(t,'completed')}`:'Pendiente'}</span></div><footer><span class="task-assignee">${t.status==='Finalizada'?'Quedó realizada':'Pendiente'}</span><small>${t.status==='Finalizada'?'Historial guardado':'Sin puntaje'}</small></footer>${actions&&t.status==='Pendiente'?`<button class="do-btn" data-do-task="${t.id}">Realizar</button>`:''}</article>`).join('')||'<div class="locked-note">No hay tareas para este filtro.</div>'}</div>`}
async function completeTask(id){const task=state.tasks.find(t=>t.id===id);if(!task||task.status!=='Pendiente')return;const done={status:'Finalizada',completedBy:state.session.operator,completedAt:Date.now()};try{if(db){await db.collection('tasks').doc(id).update(done)}else{Object.assign(task,done)}}catch(e){console.warn('No se pudo marcar la tarea como realizada',e);toast('No se pudo guardar el historial de la tarea');return;}const target=task.operator==='Todos'?'pendiente para todos':`asignada a ${task.operator}`;addActivity(`${state.session.operator} dejó realizada la tarea ${task.title} (${target}).`);toast('La tarea quedó realizada y el historial fue guardado');render();}
function taskComposer(){return`<form class="task-form" id="taskForm"><label>Título<input id="taskTitle" maxlength="60" placeholder="Ej: Validar solicitud Via 21" required></label><label>Asignación<select id="taskAssignee"><option value="Todos">Pendiente para todos</option>${activeOperators().map(o=>`<option value="${escapeHtml(o.name)}">${escapeHtml(o.name)}</option>`).join('')}</select></label><label>Categoría<select id="taskCategory">${channels.filter(c=>c!=='General turno').map(c=>`<option>${c}</option>`).join('')}</select></label><label>Prioridad<select id="taskPriority"><option>Media</option><option>Alta</option><option>Crítica</option><option>Baja</option></select></label><label class="full">Descripción<textarea id="taskDescription" maxlength="180" placeholder="Detalle operativo para que cualquier agente pueda tomarla." required></textarea></label><button type="submit">＋ Agregar tarea pendiente</button></form>`}
async function createTask(){const title=$('taskTitle')?.value.trim(),description=$('taskDescription')?.value.trim();if(!title||!description){toast('Completá título y descripción');return;}const priority=$('taskPriority').value,category=$('taskCategory').value,operator=$('taskAssignee').value,createdAt=Date.now();const task={title,description,priority,operator,status:'Pendiente',time:time(createdAt),category,tags:[operator==='Todos'?'Equipo':'Asignada',category],createdBy:state.session.operator,createdAt};try{if(db){await db.collection('tasks').add({...task,createdAtMs:createdAt})}else{state.tasks.unshift({id:crypto.randomUUID(),...task})}}catch(e){console.warn('No se pudo guardar la tarea',e);toast('No se pudo guardar la tarea en Firestore');return;}addActivity(`${state.session.operator} agregó la tarea ${title} ${operator==='Todos'?'pendiente para todos':`asignada a ${operator}`}.`);toast(operator==='Todos'?'Tarea publicada para todos':'Tarea asignada a '+operator);render();}
function initFirestore(){if(!window.firebase){setFirebaseStatus('Firebase SDK no cargó');console.warn('Firebase SDK no cargó. Revisá conexión o scripts de Firebase.');toast('Firebase SDK no cargó: los mensajes NO se guardan');return;}if(!canUseFirestore()){setFirebaseStatus('Firebase sin configurar');console.warn('Firebase no configurado: falta projectId en firebaseConfig o la inicialización de Firebase Hosting.');toast('Firebase no configurado: los mensajes NO se guardan');return;}try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.firestore();setFirebaseStatus(`Firebase conectado: ${firebase.app().options.projectId||'proyecto activo'}`);subscribeUsers();subscribeTasks();subscribeMessages();subscribeQya();startPresenceHeartbeat();toast('Firestore conectado: chats, tareas, usuarios y Q&A se guardan en Firebase');}catch(e){console.warn('Firestore no disponible',e);db=null;setFirebaseStatus('Firestore no disponible');toast('Firestore no disponible: revisá firebaseConfig y reglas');}}
function processTaskNotifications(){if(!state.session)return;state.tasks.forEach(t=>{const assigned=t.operator===state.session.operator||t.operator==='Todos';if(t.status==='Pendiente'&&assigned&&!state.seenTaskIds.has(t.id)){state.seenTaskIds.add(t.id);if(t.createdBy!==state.session.operator)notifyBell('task',t.operator==='Todos'?`Nueva tarea para todos: ${t.title}`:`Te asignaron una tarea: ${t.title}`,t.id);}});saveAlertState();}
function seedMissingUsers(remote=[]){if(!db||state.seededUsers)return;state.seededUsers=true;defaultUsers.filter(def=>!remote.some(u=>u.id===def.id||u.name.toLowerCase()===def.name.toLowerCase())).forEach(def=>db.collection('users').doc(def.id).set({...def,active:true},{merge:true}).catch(e=>console.warn('No se pudo crear usuario base',def.name,e)));}
function subscribeUsers(){if(!db)return;if(unsubUsers)unsubUsers();unsubUsers=db.collection('users').orderBy('name','asc').onSnapshot(snapshot=>{const remote=snapshot.docs.map((doc,i)=>{const data=doc.data();return{id:doc.id,name:data.name||doc.id,post:data.post||`Puesto ${i+1}`,active:data.active!==false,workAreas:data.workAreas||['General turno'],leader:!!data.leader,lastSeenMs:data.lastSeenMs||0,currentWorkArea:data.currentWorkArea,online:Date.now()-(data.lastSeenMs||0)<90000};});seedMissingUsers(remote);const merged=defaultUsers.map(def=>{const remoteUser=remote.find(u=>u.id===def.id||u.name.toLowerCase()===def.name.toLowerCase());return{...def,active:true,lastSeenMs:0,online:false,...remoteUser};});remote.filter(u=>!merged.some(m=>m.id===u.id||m.name.toLowerCase()===u.name.toLowerCase())).forEach(u=>merged.push(u));state.operators=merged;if(state.session&&!activeOperators().some(o=>o.name===state.session.operator)){toast('Tu usuario fue dado de baja en Firebase');logout();return;}populateLogin();if(state.session)render();},e=>{console.warn('No se pudieron sincronizar usuarios',e);toast('No se pudieron sincronizar usuarios con Firestore');});}
function currentUserDoc(){return activeOperators().find(o=>o.name===state.session?.operator)}
function userInChannel(user,channel){return channel==='General turno'||(user.workAreas||[]).includes(channel)}
async function updatePresence(){if(!db||!state.session)return;const user=currentUserDoc();if(!user?.id)return;await db.collection('users').doc(user.id).set({name:state.session.operator,post:state.session.post,active:true,currentWorkArea:state.currentWorkArea,lastSeenMs:Date.now()},{merge:true});}
function startPresenceHeartbeat(){if(state.presenceTimer)return;state.presenceTimer=setInterval(updatePresence,60000);}
function subscribeTasks(){if(!db)return;if(unsubTasks)unsubTasks();unsubTasks=db.collection('tasks').orderBy('createdAtMs','desc').onSnapshot(snapshot=>{state.tasks=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));processTaskNotifications();render();},e=>{console.warn('No se pudieron sincronizar tareas',e);toast('No se pudieron sincronizar tareas con Firestore');});}

function subscribeMessages(){if(!db)return;if(unsubMessages)unsubMessages();unsubMessages=db.collection('messages').orderBy('createdAtMs','asc').onSnapshot(snapshot=>{const fromDb=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));state.messages=fromDb.map(m=>({id:m.id,channel:m.channel||'General turno',operator:m.operator,post:m.post,text:m.text,createdAt:m.createdAtMs||m.createdAt||Date.now(),important:!!m.important,attachments:m.attachments||[]}));render();},e=>{console.warn('No se pudieron sincronizar mensajes',e);toast('No se pudieron sincronizar mensajes con Firestore');});}

function subscribePrivateMessages(){if(!db||!state.session)return;if(unsubPrivate)unsubPrivate();unsubPrivate=db.collection('privateMessages').where('participants','array-contains',state.session.operator).onSnapshot(snapshot=>{state.privateMessages={};snapshot.docs.map(doc=>({id:doc.id,...doc.data()})).sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0)).forEach(m=>{const key=privateKey(m.from,m.to);state.privateMessages[key]=[...(state.privateMessages[key]||[]),{id:m.id,operator:m.from,post:m.post,text:m.text,createdAt:m.createdAtMs,important:m.important,to:m.to,attachments:m.attachments||[]}];if(m.to===state.session.operator&&m.from!==state.session.operator&&!state.seenMessageIds.has(m.id)){state.seenMessageIds.add(m.id);notifyBell('message',`Mensaje directo de ${m.from}: ${m.text.slice(0,70)}`,m.id);}});saveAlertState();render();},e=>{console.warn('No se pudieron sincronizar privados',e);});}


function subscribeQya(){if(!db)return;if(unsubQya)unsubQya();unsubQya=db.collection('qyaItems').orderBy('createdAtMs','asc').onSnapshot(snapshot=>{state.qyaItems=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));render();},e=>{console.warn('No se pudo sincronizar Q&A',e);toast('No se pudo sincronizar Q&A con Firestore');});}

function highlightText(text,term){if(!term)return escapeHtml(text);const safe=term.replace(/[-\/\^$*+?.()|[\]{}]/g,'\$&');return escapeHtml(text).replace(new RegExp(`(${safe})`,'ig'),'<mark>$1</mark>');}
function qya(){
  const term=(state.qyaSearch||'').trim().toLowerCase();
  const base=state.qyaItems||[];
  const list=base.filter(item=>!term||[item.question,item.answer].some(v=>String(v||'').toLowerCase().includes(term)));
  const empty=term?'No se encontraron resultados para esa búsqueda. Probá con otra palabra clave.':'Todavía no hay preguntas en Firestore. Agregá la primera desde el panel administrador o cargalas manualmente en la colección qyaItems.';
  return `<div class="module"><section class="module-hero card glass"><div class="module-icon">📘</div><div><p class="eyebrow">BASE OPERATIVA</p><h2>Q&A operativo</h2><p class="muted">Las preguntas y respuestas se leen y guardan en Cloud Firestore.</p></div></section><div class="card glass"><div class="search" style="margin-bottom:12px">⌕ <input id="qyaSearchInput" placeholder="Buscar por palabra clave en preguntas y respuestas" value="${escapeHtml(state.qyaDraftSearch||state.qyaSearch||'')}"></div><p class="muted" style="margin-bottom:10px">La búsqueda usa los datos sincronizados desde Firestore.</p><div class="filters"><button class="active">Preguntas en Firestore: ${base.length}</button><button class="active">Resultados encontrados: ${list.length}</button></div>${list.length?`<div class="qya-grid">${list.map(item=>`<article class="qya-card"><div class="qya-icon">${escapeHtml(item.icon||'❓')}</div><div><h3>${highlightText(item.question||'',term)}</h3><p>${highlightText(item.answer||'',term)}</p></div></article>`).join('')}</div>`:`<div class="locked-note">${empty}</div>`}</div><div class="card glass">${head('Panel administrador · Agregar nueva pregunta a Firestore')}<form id="qyaForm" class="task-form"><label>Clave de administrador<input id="qyaKey" type="password" maxlength="10" placeholder="Ingresar clave" required></label><label>Ícono<input id="qyaIcon" maxlength="4" placeholder="Ejemplo: 🚨" required></label><label class="full">Pregunta<input id="qyaQuestion" maxlength="140" required></label><label class="full">Respuesta<textarea id="qyaAnswer" maxlength="340" required></textarea></label><button type="submit">＋ Guardar pregunta en Firestore</button></form><p id="qyaError" class="muted" style="color:var(--danger);margin-top:10px"></p></div></div>`
}
function timeline(events){return`<div class="timeline">${events.map(e=>`<div><i></i><span>${e.time}</span><p>${e.text}</p></div>`).join('')}</div>`}
function privateKey(a,b){return [a,b].sort().join('__')}
function renderAttachments(items=[]){return items.length?`<div class="message-images">${items.map(a=>`<a href="${a.url}" target="_blank" rel="noopener"><img class="message-image" src="${a.url}" alt="${escapeHtml(a.name||'Imagen adjunta')}"></a>`).join('')}</div>`:''}
function attachmentPreview(){return state.pendingAttachments.length?`<div class="attachment-preview">${state.pendingAttachments.map((a,i)=>`<span><img src="${a.url}" alt="${escapeHtml(a.name)}"><button type="button" data-remove-attachment="${i}">×</button></span>`).join('')}</div>`:''}
function imageFileToAttachment(file){return new Promise((resolve,reject)=>{if(!file.type.startsWith('image/')){reject(new Error('Solo se permiten imágenes'));return;}const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const max=1280,scale=Math.min(1,max/Math.max(img.width,img.height)),canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);resolve({name:file.name||'imagen pegada',type:'image/jpeg',url:canvas.toDataURL('image/jpeg',.82),createdAtMs:Date.now()});};img.onerror=reject;img.src=reader.result;};reader.onerror=reject;reader.readAsDataURL(file);});}
async function addImageFiles(files){for(const file of [...files].slice(0,3-state.pendingAttachments.length)){try{state.pendingAttachments.push(await imageFileToAttachment(file));}catch(e){toast(e.message||'No se pudo adjuntar la imagen');}}render();}
function bindPage(){document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.active=b.dataset.go;render()});document.querySelectorAll('[data-channel]').forEach(b=>b.onclick=()=>{state.privateTo=null;state.currentChannel=b.dataset.channel;state.currentWorkArea=b.dataset.channel;updatePresence();markMessagesRead();render()});document.querySelectorAll('[data-private]').forEach(b=>b.onclick=()=>{state.privateTo=b.dataset.private;markMessagesRead();render()});document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.taskFilter=b.dataset.filter;render()});document.querySelectorAll('[data-status-filter]').forEach(b=>b.onclick=()=>{state.taskStatusFilter=b.dataset.statusFilter;render()});document.querySelectorAll('[data-do-task]').forEach(b=>b.onclick=()=>completeTask(b.dataset.doTask));document.querySelectorAll('#taskForm').forEach(f=>f.onsubmit=e=>{e.preventDefault();createTask();});document.querySelectorAll('[data-remove-attachment]').forEach(b=>b.onclick=()=>{state.pendingAttachments.splice(Number(b.dataset.removeAttachment),1);render();});const imageInput=$('imageInput'),attach=$('attachImage');if(attach&&imageInput){attach.onclick=()=>imageInput.click();imageInput.onchange=e=>addImageFiles(e.target.files);}const qyaSearchInput=$('qyaSearchInput');if(qyaSearchInput){qyaSearchInput.oninput=e=>{state.qyaDraftSearch=e.target.value;if(state.qyaSearchTimer)clearTimeout(state.qyaSearchTimer);state.qyaSearchTimer=setTimeout(()=>{state.qyaSearch=state.qyaDraftSearch.trim();render();},280);};qyaSearchInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();if(state.qyaSearchTimer)clearTimeout(state.qyaSearchTimer);state.qyaSearch=state.qyaDraftSearch.trim();render();}};}const qyaForm=$('qyaForm');if(qyaForm)qyaForm.onsubmit=async e=>{e.preventDefault();const key=$('qyaKey').value.trim();if(key!=='3321'){const er=$('qyaError');if(er)er.textContent='Clave incorrecta. No tenés permisos para agregar preguntas.';return;}if(!db){const er=$('qyaError');if(er)er.textContent='Firebase no conectado. No se puede guardar Q&A.';toast('Firebase no conectado: Q&A no se guardó');return;}const item={icon:$('qyaIcon').value.trim()||'❓',question:$('qyaQuestion').value.trim(),answer:$('qyaAnswer').value.trim(),createdBy:state.session.operator,createdAtMs:Date.now()};if(!item.question||!item.answer)return;try{await db.collection('qyaItems').add(item);state.qyaSearch='';state.qyaDraftSearch='';toast('Pregunta Q&A guardada en Firestore');}catch(err){console.warn('No se pudo guardar Q&A',err);const er=$('qyaError');if(er)er.textContent=`No se pudo guardar en Firestore: ${err.code||err.message||'error'}`;}};const send=$('sendMessage'),input=$('messageInput');if(send&&input){send.onclick=sendMessage;input.onkeydown=e=>{if(e.key==='Enter')sendMessage()};input.onpaste=e=>{const files=[...e.clipboardData.files].filter(f=>f.type.startsWith('image/'));if(files.length){e.preventDefault();addImageFiles(files);}};setTimeout(()=>{$('messages').scrollTop=$('messages').scrollHeight},0)}document.querySelectorAll('[data-task-from-message]').forEach(b=>b.onclick=async()=>{const msg=[...state.messages,...Object.values(state.privateMessages).flat()].find(m=>m.id===b.dataset.taskFromMessage);const createdAt=Date.now(),task={title:'Tarea desde chat',description:msg.text,priority:'Media',operator:state.session.operator,status:'Pendiente',time:time(createdAt),category:state.currentChannel==='General turno'?'Monitoreo':state.currentChannel,tags:['Chat','Derivada'],createdBy:state.session.operator,createdAt};if(db){await db.collection('tasks').add({...task,createdAtMs:createdAt})}else{state.tasks.unshift({id:crypto.randomUUID(),...task})}addActivity(`${state.session.operator} creó una tarea desde el chat.`);toast('Tarea creada desde mensaje');render();})}
async function sendMessage(){const input=$('messageInput');if(!input||(!input.value.trim()&&!state.pendingAttachments.length))return;if(!db){toast('Firebase no conectado: el mensaje NO se guardó en Firestore');console.warn('Intento de enviar mensaje sin conexión a Firestore. Revisá el estado Firebase de la barra superior y las reglas de Firestore.');return;}const createdAt=Date.now();const message={id:crypto.randomUUID(),operator:state.session.operator,post:state.session.post,text:input.value.trim(),attachments:[...state.pendingAttachments],createdAt,important:/!|crítico|critico/i.test(input.value)};try{if(state.privateTo){await db.collection('privateMessages').add({from:state.session.operator,to:state.privateTo,participants:[state.session.operator,state.privateTo],post:state.session.post,text:message.text,attachments:message.attachments,important:message.important,createdAtMs:createdAt});addActivity(`${state.session.operator} envió un mensaje privado a ${state.privateTo}.`)}else{await db.collection('messages').add({channel:state.currentChannel,audience:state.currentChannel==='General turno'?'all':state.currentChannel,operator:state.session.operator,post:state.session.post,text:message.text,attachments:message.attachments,important:message.important,createdAtMs:createdAt});addActivity(`${state.session.operator} envió un mensaje en ${state.currentChannel}.`)}}catch(e){console.warn('No se pudo guardar el mensaje',e);toast(`No se pudo guardar en Firestore: ${e.code||e.message||'error'}`);return;}input.value='';state.pendingAttachments=[];toast(`Mensaje guardado en Firebase por ${state.session.operator}`);render();}
function toast(text){const id=crypto.randomUUID();state.notifications.unshift({id,text});renderToasts();setTimeout(()=>{state.notifications=state.notifications.filter(n=>n.id!==id);renderToasts();},4800);}
function renderToasts(){$('toasts').innerHTML=state.notifications.slice(0,3).map(n=>`<div class="toast glass"><b>⚡</b><span>${escapeHtml(n.text)}</span></div>`).join('')}
function logout(){if(state.session){state.operators=state.operators.map(o=>o.name===state.session.operator?{...o,online:false}:o);addActivity(`${state.session.operator} liberó ${state.session.post}.`)}if(unsubPrivate){unsubPrivate();unsubPrivate=null;}localStorage.removeItem('internamatutino-session');state.session=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');populateLogin();toast('Puesto liberado correctamente');}
boot();
</script>
</body>
</html>
